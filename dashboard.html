
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>
<body class="bg-blue-50">

<div class="bg-blue-900 text-white p-5 flex justify-between">
  <div>
    <h1 class="text-3xl font-bold">Ship Dashboard</h1>
    <p class="text-blue-200">ระบบติดตามเรือเข้า-ออก</p>
  </div>

  <button onclick="logout()"
    class="bg-red-500 px-4 py-2 rounded-xl">
    Logout
  </button>
</div>

<div class="grid lg:grid-cols-3 gap-6 p-6">

  <div class="bg-white p-6 rounded-2xl shadow-xl">

    <h2 class="text-xl font-bold mb-4 text-blue-900">
      เพิ่มข้อมูลเรือ
    </h2>

    <form id="shipForm" class="space-y-4">

      <input required id="shipName"
        placeholder="ชื่อเรือ *"
        class="w-full border p-3 rounded-xl">

      <input required type="date" id="arrivalDate"
        class="w-full border p-3 rounded-xl">

      <input required type="date" id="departureDate"
        class="w-full border p-3 rounded-xl">

      <input id="port"
        placeholder="ท่าเรือ"
        class="w-full border p-3 rounded-xl">

      <button
        class="w-full bg-blue-700 text-white p-3 rounded-xl font-bold">
        บันทึกข้อมูล
      </button>

    </form>

  </div>

  <div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-xl">
    <div id="calendar"></div>
  </div>

</div>

<div class="grid lg:grid-cols-2 gap-6 px-6 pb-10">

  <div class="bg-white p-6 rounded-2xl shadow-xl">
    <h2 class="text-xl font-bold text-blue-900 mb-4">
      Summary
    </h2>

    <div class="bg-blue-100 p-5 rounded-xl">
      <p>จำนวนเรือทั้งหมด</p>
      <h3 id="totalShips"
        class="text-4xl font-bold text-blue-900">
        0
      </h3>
    </div>
  </div>

  <div class="bg-white p-6 rounded-2xl shadow-xl">
    <h2 class="text-xl font-bold text-blue-900 mb-4">
      Forecast
    </h2>

    <div id="forecastBox"></div>
  </div>

</div>

<script>
if(!localStorage.getItem('loggedInUser')){
  window.location.href = 'index.html';
}

function logout(){
  localStorage.removeItem('loggedInUser');
  window.location.href = 'index.html';
}

let shipData = JSON.parse(localStorage.getItem('shipData') || "[]");

const calendar = new FullCalendar.Calendar(
  document.getElementById('calendar'),
  {
    initialView: 'dayGridMonth',
    height: 650,
    events: shipData.map(s => ({
      title: "🚢 " + s.name,
      start: s.arrival,
      end: s.departure
    }))
  }
);

calendar.render();

updateSummary();
generateForecast();

document.getElementById('shipForm')
.addEventListener('submit', function(e){

  e.preventDefault();

  const ship = {
    name: shipName.value,
    arrival: arrivalDate.value,
    departure: departureDate.value,
    port: port.value
  };

  shipData.push(ship);

  localStorage.setItem('shipData',
    JSON.stringify(shipData));

  calendar.addEvent({
    title: "🚢 " + ship.name,
    start: ship.arrival,
    end: ship.departure
  });

  sendToGoogleSheets(ship);

  updateSummary();
  generateForecast();

  alert('บันทึกสำเร็จ');
  this.reset();
});

function updateSummary(){
  totalShips.innerText = shipData.length;
}

function generateForecast(){

  forecastBox.innerHTML = '';

  const grouped = {};

  shipData.forEach(ship => {
    if(!grouped[ship.name]){
      grouped[ship.name] = [];
    }

    grouped[ship.name].push(
      new Date(ship.arrival)
    );
  });

  for(const name in grouped){

    const dates = grouped[name]
      .sort((a,b)=>a-b);

    if(dates.length >= 2){

      let gaps = [];

      for(let i=1;i<dates.length;i++){
        gaps.push(
          (dates[i]-dates[i-1])
          /(1000*60*60*24)
        );
      }

      const avgGap =
        gaps.reduce((a,b)=>a+b,0)
        /gaps.length;

      const nextDate =
        new Date(dates[dates.length-1]);

      nextDate.setDate(
        nextDate.getDate() + Math.round(avgGap)
      );

      forecastBox.innerHTML += `
        <div class="bg-blue-100 p-4 rounded-xl mb-3">
          <strong>${name}</strong><br/>
          คาดว่าจะเข้าอีกครั้ง:
          <span class="font-bold text-blue-900">
            ${nextDate.toLocaleDateString('th-TH')}
          </span>
        </div>
      `;
    }
  }
}

async function sendToGoogleSheets(ship){

  const SCRIPT_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL";

  try{
    await fetch(SCRIPT_URL,{
      method:'POST',
      body: JSON.stringify(ship)
    });
  }catch(err){
    console.log(err);
  }
}
</script>

</body>
</html>
