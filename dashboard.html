<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Ship Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100">

<div class="bg-blue-900 text-white p-5 shadow-xl">
<h1 class="text-3xl font-bold">Ship Logistics Dashboard</h1>
<p class="text-blue-200">ระบบติดตามเรือเข้า-ออกบริษัท</p>
</div>

<div class="grid lg:grid-cols-4 gap-6 p-6">
<div class="bg-white p-5 rounded-2xl shadow-xl">
<p class="text-gray-500">เรือทั้งหมด</p>
<h2 id="totalShips" class="text-4xl font-bold text-blue-900">0</h2>
</div>

<div class="bg-white p-5 rounded-2xl shadow-xl">
<p class="text-gray-500">เดือนที่เรือเข้าเยอะสุด</p>
<h2 id="bestMonth" class="text-2xl font-bold text-blue-900">-</h2>
</div>

<div class="bg-white p-5 rounded-2xl shadow-xl">
<p class="text-gray-500">เรือเข้าบ่อยสุด</p>
<h2 id="topShip" class="text-2xl font-bold text-blue-900">-</h2>
</div>

<div class="bg-white p-5 rounded-2xl shadow-xl">
<p class="text-gray-500">เรือเดือนนี้</p>
<h2 id="monthShips" class="text-4xl font-bold text-blue-900">0</h2>
</div>
</div>

<div class="grid lg:grid-cols-3 gap-6 px-6">
<div class="bg-white p-6 rounded-2xl shadow-xl">
<h2 class="text-xl font-bold text-blue-900 mb-4">เพิ่มข้อมูลเรือ</h2>

<form id="shipForm" class="space-y-4">
<input required id="shipName" placeholder="ชื่อเรือ" class="w-full border p-3 rounded-xl">
<input required type="date" id="arrivalDate" class="w-full border p-3 rounded-xl">
<input required type="date" id="departureDate" class="w-full border p-3 rounded-xl">
<input id="port" placeholder="ท่าเรือ" class="w-full border p-3 rounded-xl">

<button class="w-full bg-blue-700 text-white p-3 rounded-xl font-bold">
บันทึกข้อมูล
</button>
</form>
</div>

<div class="lg:col-span-2 bg-white p-6 rounded-2xl shadow-xl">
<div id="calendar"></div>
</div>
</div>

<div class="grid lg:grid-cols-2 gap-6 p-6">
<div class="bg-white p-6 rounded-2xl shadow-xl">
<h2 class="text-xl font-bold text-blue-900 mb-4">
กราฟจำนวนเรือรายเดือน
</h2>
<canvas id="monthlyChart"></canvas>
</div>

<div class="bg-white p-6 rounded-2xl shadow-xl">
<h2 class="text-xl font-bold text-blue-900 mb-4">
กราฟจำนวนเรือรายปี
</h2>
<canvas id="yearlyChart"></canvas>
</div>
</div>

<div class="grid lg:grid-cols-2 gap-6 px-6 pb-10">
<div class="bg-white p-6 rounded-2xl shadow-xl">
<h2 class="text-xl font-bold text-blue-900 mb-4">Forecast</h2>
<div id="forecastBox"></div>
</div>

<div class="bg-white p-6 rounded-2xl shadow-xl overflow-auto">
<h2 class="text-xl font-bold text-blue-900 mb-4">ตารางข้อมูลเรือ</h2>

<table class="w-full">
<thead>
<tr class="bg-blue-100">
<th class="p-3">ชื่อเรือ</th>
<th class="p-3">วันเข้า</th>
<th class="p-3">วันออก</th>
<th class="p-3">ท่าเรือ</th>
</tr>
</thead>

<tbody id="shipTable"></tbody>
</table>
</div>
</div>

<script>
let shipData = JSON.parse(localStorage.getItem('shipData') || "[]");

const calendar = new FullCalendar.Calendar(
document.getElementById('calendar'),
{
initialView:'dayGridMonth',
height:650,
events: shipData.map(s => ({
title:"🚢 " + s.name,
start:s.arrival,
end:s.departure
}))
}
);

calendar.render();

document.getElementById('shipForm')
.addEventListener('submit', function(e){

e.preventDefault();

const ship = {
name: shipName.value,
arrival: arrivalDate.value,
departure: departureDate.value,
port: port.value
};

shipData.push(ship);

localStorage.setItem(
'shipData',
JSON.stringify(shipData)
);

calendar.addEvent({
title:"🚢 " + ship.name,
start: ship.arrival,
end: ship.departure
});

renderDashboard();

this.reset();

});

let monthlyChart;
let yearlyChart;

function renderDashboard(){

document.getElementById('totalShips').innerText = shipData.length;

const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const monthCount = {};
const yearCount = {};
const shipCount = {};

shipData.forEach(ship => {

const date = new Date(ship.arrival);

const month = monthNames[date.getMonth()];
const year = date.getFullYear();

monthCount[month] = (monthCount[month] || 0) + 1;
yearCount[year] = (yearCount[year] || 0) + 1;
shipCount[ship.name] = (shipCount[ship.name] || 0) + 1;

});

const currentMonth = monthNames[new Date().getMonth()];

document.getElementById('monthShips').innerText = monthCount[currentMonth] || 0;

let bestMonth = '-';
let bestMonthCount = 0;

for(const month in monthCount){
if(monthCount[month] > bestMonthCount){
bestMonthCount = monthCount[month];
bestMonth = month;
}
}

document.getElementById('bestMonth').innerText = bestMonth;

let topShip = '-';
let topCount = 0;

for(const ship in shipCount){
if(shipCount[ship] > topCount){
topCount = shipCount[ship];
topShip = ship;
}
}

document.getElementById('topShip').innerText = topShip;

renderCharts(monthCount, yearCount);
renderForecast();
renderTable();

}

function renderCharts(monthCount, yearCount){

if(monthlyChart){ monthlyChart.destroy(); }
if(yearlyChart){ yearlyChart.destroy(); }

monthlyChart = new Chart(
document.getElementById('monthlyChart'),
{
type:'bar',
data:{
labels:Object.keys(monthCount),
datasets:[{
label:'จำนวนเรือ',
data:Object.values(monthCount),
borderWidth:1
}]
}
}
);

yearlyChart = new Chart(
document.getElementById('yearlyChart'),
{
type:'line',
data:{
labels:Object.keys(yearCount),
datasets:[{
label:'จำนวนเรือ',
data:Object.values(yearCount),
fill:false,
tension:0.3
}]
}
}
);

}

function renderForecast(){

const forecastBox = document.getElementById('forecastBox');
forecastBox.innerHTML = '';

const grouped = {};

shipData.forEach(ship => {

if(!grouped[ship.name]){
grouped[ship.name] = [];
}

grouped[ship.name].push(new Date(ship.arrival));

});

for(const name in grouped){

const dates = grouped[name].sort((a,b)=>a-b);

if(dates.length >= 2){

let gaps = [];

for(let i=1;i<dates.length;i++){

gaps.push(
(dates[i]-dates[i-1])/(1000*60*60*24)
);

}

const avgGap = gaps.reduce((a,b)=>a+b,0)/gaps.length;

const nextDate = new Date(dates[dates.length-1]);

nextDate.setDate(
nextDate.getDate() + Math.round(avgGap)
);

forecastBox.innerHTML += `
<div class="bg-blue-100 p-4 rounded-xl mb-3">
<strong>${name}</strong><br/>
คาดว่าจะเข้าอีกครั้ง:
<span class="font-bold text-blue-900">
${nextDate.toLocaleDateString('th-TH')}
</span>
</div>
`;

}

}

if(forecastBox.innerHTML === ''){
forecastBox.innerHTML =
'ต้องมีข้อมูลเรือลำเดิมอย่างน้อย 2 รอบ';
}

}

function renderTable(){

const table = document.getElementById('shipTable');

table.innerHTML = '';

shipData.forEach(ship => {

table.innerHTML += `
<tr class="border-b">
<td class="p-3">${ship.name}</td>
<td class="p-3">${ship.arrival}</td>
<td class="p-3">${ship.departure}</td>
<td class="p-3">${ship.port || '-'}</td>
</tr>
`;

});

}

renderDashboard();

</script>

</body>
</html>
